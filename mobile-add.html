<input id="task" placeholder="Nouvelle tâche">
<button onclick="send()">Ajouter</button>

<script>
function send() {
  const text = document.getElementById("task").value;

  fetch("/api/tasks", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text })
  }).then(() => {
    alert("Tâche ajoutée !");
    document.getElementById("task").value = "";
  });
}
</script>
